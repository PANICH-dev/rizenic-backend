<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZENIC ERP - Repair Stations Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Noto Sans Thai', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 border-b border-gray-700 pb-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-screwdriver-wrench text-3xl text-amber-500"></i>
                <h1 class="text-3xl font-bold tracking-wider text-white">แผงควบคุมสถานีซ่อมและงานช่าง</h1>
            </div>
            <a href="index.html" class="px-5 py-2.5 bg-gray-800 hover:bg-gray-700 rounded-xl font-semibold border border-gray-700 transition flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> กลับหน้าเปิดบิล
            </a>
        </div>

        <div class="flex border-b border-gray-700 mb-8 gap-2">
            <button onclick="switchRepairSubTab('menu-calendar')" id="btn-menu-calendar" class="px-5 py-3 border-b-2 border-amber-500 text-amber-400 font-bold flex items-center gap-2 transition"><i class="fa-solid fa-calendar-days"></i> 1. ปฏิทินและแผนกำหนดเสร็จ</button>
            <button onclick="switchRepairSubTab('menu-cake')" id="btn-menu-cake" class="px-5 py-3 border-b-2 border-transparent text-gray-400 hover:text-white font-semibold flex items-center gap-2 transition"><i class="fa-solid fa-chart-pie"></i> 2. สรุปก้อนเค้กยอดสถานี</button>
            <button onclick="switchRepairSubTab('menu-list')" id="btn-menu-list" class="px-5 py-3 border-b-2 border-transparent text-gray-400 hover:text-white font-semibold flex items-center gap-2 transition"><i class="fa-solid fa-rectangle-list"></i> 3. รายการรถในกระบวนการซ่อม</button>
        </div>

        <div id="menu-calendar" class="repair-sub-tab block">
            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 mb-6 flex justify-between items-center">
                <button onclick="changeMonth(-1)" class="px-4 py-2 bg-gray-900 border border-gray-600 rounded-xl hover:bg-gray-700 font-bold font-mono text-sm"><i class="fa-solid fa-chevron-left"></i> เดือนก่อนหน้า</button>
                <h2 id="calendar_month_title" class="text-xl font-black text-white tracking-wide">เดือนกรกฎาคม 2026</h2>
                <button onclick="changeMonth(1)" class="px-4 py-2 bg-gray-900 border border-gray-600 rounded-xl hover:bg-gray-700 font-bold font-mono text-sm">เดือนถัดไป <i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-7 gap-2 text-center text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
                <div class="p-2">อา.</div><div class="p-2">จ.</div><div class="p-2">อ.</div><div class="p-2">พ.</div><div class="p-2">พฤ.</div><div class="p-2">ศ.</div><div class="p-2">ส.</div>
            </div>
            <div id="calendar_grid" class="grid grid-cols-7 gap-2 min-h-[500px]"></div>
        </div>

        <div id="menu-cake" class="repair-sub-tab hidden">
            <div class="bg-gray-800 p-8 rounded-2xl border border-gray-700 flex flex-col items-center justify-center max-w-xl mx-auto shadow-2xl">
                <h2 class="text-lg font-bold text-white mb-6 flex items-center gap-2"><i class="fa-solid fa-chart-pie text-amber-500"></i> สัดส่วนปริมาณรถค้างในแต่ละสถานี (Pie Chart)</h2>
                <div class="w-full h-80 relative flex justify-center">
                    <canvas id="stationPieChart"></canvas>
                </div>
            </div>
        </div>

        <div id="menu-list" class="repair-sub-tab hidden">
            <div class="bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-black/40 text-gray-400 text-xs uppercase">
                            <tr class="border-b border-gray-700">
                                <th class="p-4">ทะเบียนรถ / รถ</th>
                                <th class="p-4">คำนวณสถานีซ่อมสูงสุด (IFS)</th>
                                <th class="p-4">สเตตัส ERPหลัก</th>
                                <th class="p-4">วันที่ช่างซ่อมเสร็จ</th>
                                <th class="p-4">หมายเหตุช่าง</th>
                                <th class="p-4 text-center">ปฏิบัติการ</th>
                            </tr>
                        </thead>
                        <tbody id="repair_list_body" class="text-sm divide-y divide-gray-800"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="stationModal" class="fixed inset-0 bg-black/80 z-[110] flex items-center justify-center hidden p-4 overflow-y-auto">
        <div class="bg-gray-800 rounded-2xl border border-gray-700 max-w-2xl w-full p-6 relative my-auto shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-xl font-bold text-white mb-2 flex items-center gap-2 text-amber-400"><i class="fa-solid fa-circle-check"></i> อัปเดตสถานีซ่อมและรายงานผลช่าง</h2>
            <p class="text-xs text-gray-400 mb-6 border-b border-gray-700 pb-2">ทะเบียนรถ: <span id="m_plate" class="text-white font-bold font-mono bg-gray-900 px-2 py-0.5 rounded border border-gray-600"></span> | รุ่นรถ: <span id="m_car" class="text-white font-semibold"></span> | ลูกค้า: <span id="m_cust" class="text-white"></span></p>
            
            <input type="hidden" id="m_job_id">
            
            <label class="block text-xs font-bold uppercase tracking-wider text-amber-500 mb-3">📍 ติ๊กเลือกสถานีที่รถคันนี้ผ่านกระบวนการทำงานแล้ว (เรียงลำดับความสำคัญ IFS)</label>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6 bg-gray-900/60 p-4 rounded-xl border border-gray-700">
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_ready" class="w-4 h-4 accent-amber-500"> 12. รอส่งมอบ</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_pak" class="w-4 h-4 accent-amber-500"> 11. พักซ่อม</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_film" class="w-4 h-4 accent-amber-500"> 10. ฟิล์ม</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_kraj" class="w-4 h-4 accent-amber-500"> 09. กระจก</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_mag" class="w-4 h-4 accent-amber-500"> 08. ซ่อมแม็ก</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_qc" class="w-4 h-4 accent-amber-500"> 07. เก็บงาน/QC</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_kat" class="w-4 h-4 accent-amber-500"> 06. ขัดสี</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_prak" class="w-4 h-4 accent-amber-500"> 05. ประกอบ</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_pon" class="w-4 h-4 accent-amber-500"> 04. พ่นสี</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_puan" class="w-4 h-4 accent-amber-500"> 03. เตรียมพื้น</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_pou" class="w-4 h-4 accent-amber-500"> 02. โป๊ว</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1"><input type="checkbox" id="chk_kho" class="w-4 h-4 accent-amber-500"> 01. เคาะ</label>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs text-gray-400 font-bold mb-1">📅 วันที่ช่างซ่อมเสร็จจริง</label>
                    <input type="date" id="m_repair_date" class="w-full p-2.5 bg-gray-900 border border-gray-600 rounded-xl text-white outline-none focus:border-amber-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 font-bold mb-1">⚙️ ปรับสเตตัสหลักในระบบ ERP</label>
                    <select id="m_job_status" class="w-full p-2.5 bg-gray-900 border border-gray-600 rounded-xl text-amber-400 font-bold outline-none focus:border-amber-500 text-sm">
                        <option value="09.จอดรอเข้าซ่อม">09.จอดรอเข้าซ่อม</option>
                        <option value="10.กำลังซ่อม">10.กำลังซ่อม</option>
                        <option value="11.รถซ่อมเสร็จรอส่งมอบ">11.รถซ่อมเสร็จรอส่งมอบ</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-xs text-gray-400 font-bold mb-1">✍️ หมายเหตุการซ่อมแซมและคอมเมนต์ช่าง</label>
                <input type="text" id="m_repair_notes" class="w-full p-3 bg-gray-900 border border-gray-600 rounded-xl text-white outline-none focus:border-amber-500 text-sm" placeholder="พิมพ์รายงานปัญหาหรือข้อมูลอะไหล่ที่นี่...">
            </div>

            <div class="flex justify-end gap-2 pt-4 border-t border-gray-700">
                <button onclick="closeModal()" class="px-5 py-2.5 bg-gray-700 hover:bg-gray-600 text-white font-bold rounded-xl text-sm transition">ปิดหน้าต่าง</button>
                <button onclick="submitRepairStation()" class="px-6 py-2.5 bg-amber-600 hover:bg-amber-500 text-white font-bold rounded-xl text-sm transition shadow-lg"><i class="fa-solid fa-floppy-disk"></i> บันทึกข้อมูลช่าง</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        let originalRepairJobs = []; 
        let currentYear = 2026;
        let currentMonth = 6; 
        let chartInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
            // 🔐 1. ระบบรักษาความปลอดภัย: เช็กว่าล็อกอินหรือยัง?
            if(sessionStorage.getItem('isLoggedIn') !== 'true') {
                alert('🚨 กรุณาเข้าสู่ระบบก่อนครับนาย!');
                window.location.href = 'index.html';
                return;
            }

            // 🔐 2. ดักจับประตู Role: ตรวจสอบสิทธิ์เฉพาะแผนกช่าง THAIRAT, BA และ Manager เท่านั้น
            const role = sessionStorage.getItem('emp_role');
            if (role !== 'THAIRAT' && role !== 'BA' && role !== 'Manager' && role !== 'Admin' && role !== 'แอดมิน') { 
                alert(`❌ สิทธิ์เข้าถึงไม่เพียงพอ! หน้าจอสถานีซ่อมนี้จำกัดเฉพาะพนักงานตำแหน่ง THAIRAT และผู้บริหารเท่านั้นครับ (สิทธิ์ของคุณคือ: ${role || 'ไม่มีตำแหน่ง'})`); 
                window.location.href = 'index.html'; 
                return; 
            }

            // ถ้าตั๋วสิทธิ์ถูกต้อง เปิดเครื่องระบบทำงานฉลุย
            fetchJobList();
        });

        function switchRepairSubTab(tabId) {
            document.querySelectorAll('.repair-sub-tab').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            ['btn-menu-calendar', 'btn-menu-cake', 'btn-menu-list'].forEach(id => {
                document.getElementById(id).className = "px-5 py-3 border-b-2 border-transparent text-gray-400 hover:text-white font-semibold flex items-center gap-2 transition";
            });
            document.getElementById('btn-' + tabId).className = "px-5 py-3 border-b-2 border-amber-500 text-amber-400 font-bold flex items-center gap-2 transition";
            if(tabId === 'menu-cake') renderPieChart();
        }

        async function fetchJobList() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/reports`);
                const data = await res.json();
                
                originalRepairJobs = data.filter(j => 
                    j.job_status === '09.จอดรอเข้าซ่อม' || 
                    j.job_status === '10.กำลังซ่อม' || 
                    j.job_status === '11.รถซ่อมเสร็จรอส่งมอบ'
                );

                renderCalendar();
                renderRepairListTable(originalRepairJobs);
            } catch (err) { console.error("โหลดข้อมูลบอร์ดช่างพัง:", err); }
        }

        function computeHighestStationIFS(j) {
            if(j.station_ready) return "13.รอส่งมอบ";
            if(j.station_pak) return "12.พักซ่อม";
            if(j.station_film) return "11.ฟิล์ม";
            if(j.station_kraj) return "10.กระจก";
            if(j.station_mag) return "09.ซ่อมแม็ก";
            if(j.station_qc) return "08.เก็บงาน";
            if(j.station_kat) return "06.ขัดสี";
            if(j.station_prak) return "05.ประกอบ";
            if(j.station_pon) return "04.พ่นสี";
            if(j.station_puan) return "03.เตรียมพื้น";
            if(j.station_pou) return "02.โป๊ว";
            if(j.station_kho) return "01.เคาะ";
            return "ยังไม่ระบุสถานี";
        }

        function renderRepairListTable(data) {
            const tbody = document.getElementById('repair_list_body');
            if(!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-500">📭 ไม่พบรถในกระบวนการผลิตซ่อมแซม</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(j => {
                const calculatedStation = computeHighestStationIFS(j);
                const finishDateStr = j.repair_finish_date ? new Date(j.repair_finish_date).toLocaleDateString('th-TH') : '-';
                
                return `
                    <tr class="hover:bg-gray-800/40 border-b border-gray-800">
                        <td class="p-4 font-bold text-white font-mono"><span class="bg-gray-900 border border-gray-700 px-2 py-1 rounded text-amber-400 mr-2">${j.car_plate || 'ไม่มีทะเบียน'}</span> ${j.car_brand} ${j.car_model || ''}</td>
                        <td class="p-4"><span class="px-2.5 py-1 bg-amber-950 border border-amber-800 rounded-lg text-amber-300 text-xs font-bold"><i class="fa-solid fa-location-crosshairs"></i> ${calculatedStation}</span></td>
                        <td class="p-4 text-xs font-semibold text-gray-400">${j.job_status}</td>
                        <td class="p-4 font-mono text-xs">${finishDateStr}</td>
                        <td class="p-4 text-gray-400 italic text-xs max-w-xs truncate">${j.repair_notes || '-'}</td>
                        <td class="p-4 text-center">
                            <button onclick="openModal('${j.id}')" class="px-3 py-1.5 bg-amber-600 hover:bg-amber-500 text-white font-bold text-xs rounded-xl transition shadow-md"><i class="fa-solid fa-gear"></i> อัปเดตสถานี</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar_grid'); grid.innerHTML = '';
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('calendar_month_title').innerText = `${monthNames[currentMonth]} ${currentYear}`;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

            for(let i = 0; i < firstDay; i++) { grid.innerHTML += `<div class="bg-gray-900/20 p-2 rounded-xl border border-transparent"></div>`; }

            for(let day = 1; day <= totalDays; day++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                
                const targetQty = originalRepairJobs.filter(j => j.target_finish_date && j.target_finish_date.split('T')[0] === dateStr).length;
                const actualQty = originalRepairJobs.filter(j => j.actual_finish_date && j.actual_finish_date.split('T')[0] === dateStr).length;
                const deliveryQty = originalRepairJobs.filter(j => j.delivery_date && j.delivery_date.split('T')[0] === dateStr).length;

                let badgeBlock = '';
                if(targetQty > 0) badgeBlock += `<div class="text-[10px] bg-blue-900/50 text-blue-300 font-bold border border-blue-800 rounded px-1 mt-1 flex justify-between"><span>📋 กำหนดเสร็จ:</span><span>${targetQty} คัน</span></div>`;
                if(actualQty > 0) badgeBlock += `<div class="text-[10px] bg-green-900/50 text-green-300 font-bold border border-green-800 rounded px-1 mt-1 flex justify-between"><span>✅ เสร็จจริง:</span><span>${actualQty} คัน</span></div>`;
                if(deliveryQty > 0) badgeBlock += `<div class="text-[10px] bg-purple-900/50 text-purple-300 font-bold border border-purple-800 rounded px-1 mt-1 flex justify-between"><span>🚗 ส่งมอบ:</span><span>${deliveryQty} คัน</span></div>`;

                grid.innerHTML += `
                    <div onclick="clickCalendarDate('${dateStr}')" class="bg-gray-800 p-2 rounded-xl border border-gray-700 hover:border-amber-500 cursor-pointer transition flex flex-col justify-between min-h-[85px]">
                        <span class="text-xs font-black text-gray-400 font-mono">${day}</span>
                        <div class="flex-1 flex flex-col justify-end">${badgeBlock}</div>
                    </div>
                `;
            }
        }

        function changeMonth(direction) {
            currentMonth += direction;
            if(currentMonth > 11) { currentMonth = 0; currentYear++; }
            if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function clickCalendarDate(dateString) {
            const dayJobs = originalRepairJobs.filter(j => 
                (j.target_finish_date && j.target_finish_date.split('T')[0] === dateString) ||
                (j.actual_finish_date && j.actual_finish_date.split('T')[0] === dateString) ||
                (j.delivery_date && j.delivery_date.split('T')[0] === dateString)
            );

            if(dayJobs.length === 0) return alert(`🔍 วันที่ ${new Date(dateString).toLocaleDateString('th-TH')} ไม่มีคิวนัดหมายใดๆ ครับนาย`);
            openModal(dayJobs[0].id);
        }

        function renderPieChart() {
            const counters = { "เคาะ":0, "โป๊ว":0, "เตรียมพื้น":0, "พ่นสี":0, "ประกอบ":0, "ขัดสี":0, "เก็บงาน":0, "ซ่อมแม็ก":0, "กระจก":0, "ฟิล์ม":0, "พักซ่อม":0, "รอส่งมอบ":0, "ยังไม่ระบุ":0 };
            
            originalRepairJobs.forEach(j => {
                const station = computeHighestStationIFS(j);
                if(station.includes("เคาะ")) counters["เคาะ"]++;
                else if(station.includes("โป๊ว")) counters["โป๊ว"]++;
                else if(station.includes("เตรียมพื้น")) counters["เตรียมพื้น"]++;
                else if(station.includes("พ่นสี")) counters["พ่นสี"]++;
                else if(station.includes("ประกอบ")) counters["ประกอบ"]++;
                else if(station.includes("ขัดสี")) counters["ขัดสี"]++;
                else if(station.includes("เก็บงาน")) counters["เก็บงาน"]++;
                else if(station.includes("ซ่อมแม็ก")) counters["ซ่อมแม็ก"]++;
                else if(station.includes("กระจก")) counters["กระจก"]++;
                else if(station.includes("ฟิล์ม")) counters["ฟิล์ม"]++;
                else if(station.includes("พักซ่อม")) counters["พักซ่อม"]++;
                else if(station.includes("รอส่งมอบ")) counters["รอส่งมอบ"]++;
                else counters["ยังไม่ระบุ"]++;
            });

            if(chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('stationPieChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(counters),
                    datasets: [{
                        data: Object.values(counters),
                        backgroundColor: ['#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#22c55e', '#10b981', '#06b6d4', '#3b82f6', '#6366f1', '#a855f7', '#ec4899', '#6b7280']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff', font: { family: 'Noto Sans Thai' } } } } }
            });
        }

        async function openModal(jobId) {
            try {
                const res = await fetch(`${API_BASE_URL}/api/report/${jobId}`);
                const job = await res.json();

                document.getElementById('m_job_id').value = job.id;
                document.getElementById('m_plate').innerText = job.car_plate || 'ไม่มีป้ายทะเบียน';
                document.getElementById('m_car').innerText = `${job.car_brand} ${job.car_model || ''}`;
                document.getElementById('m_cust').innerText = job.customer_name;
                
                document.getElementById('chk_kho').checked = job.station_kho;
                document.getElementById('chk_pou').checked = job.station_pou;
                document.getElementById('chk_puan').checked = job.station_puan;
                document.getElementById('chk_pon').checked = job.station_pon;
                document.getElementById('chk_prak').checked = job.station_prak;
                document.getElementById('chk_kat').checked = job.station_kat;
                document.getElementById('chk_qc').checked = job.station_qc;
                document.getElementById('chk_mag').checked = job.station_mag;
                document.getElementById('chk_kraj').checked = job.station_kraj;
                document.getElementById('chk_film').checked = job.station_film;
                document.getElementById('chk_pak').checked = job.station_pak;
                document.getElementById('chk_ready').checked = job.station_ready;

                document.getElementById('m_repair_notes').value = job.repair_notes || '';
                document.getElementById('m_job_status').value = job.job_status || '10.กำลังซ่อม';
                if(job.repair_finish_date) document.getElementById('m_repair_date').value = job.repair_finish_date.split('T')[0];
                else document.getElementById('m_repair_date').value = '';

                document.getElementById('stationModal').classList.remove('hidden');
            } catch(e) { alert('❌ ไม่สามารถโหลดป๊อปอัปช่างได้'); }
        }

        function closeModal() { document.getElementById('stationModal').classList.add('hidden'); }

        async function submitRepairStation() {
            const id = document.getElementById('m_job_id').value;
            const payload = {
                station_kho: document.getElementById('chk_kho').checked,
                station_pou: document.getElementById('chk_pou').checked,
                station_puan: document.getElementById('chk_puan').checked,
                station_pon: document.getElementById('chk_pon').checked,
                station_prak: document.getElementById('chk_prak').checked,
                station_kat: document.getElementById('chk_kat').checked,
                station_qc: document.getElementById('chk_qc').checked,
                station_mag: document.getElementById('chk_mag').checked,
                station_kraj: document.getElementById('chk_kraj').checked,
                station_film: document.getElementById('chk_film').checked,
                station_pak: document.getElementById('chk_pak').checked,
                station_ready: document.getElementById('chk_ready').checked,
                repair_notes: document.getElementById('m_repair_notes').value,
                repair_finish_date: document.getElementById('m_repair_date').value || null,
                job_status: document.getElementById('m_job_status').value
            };

            try {
                const res = await fetch(`${API_BASE_URL}/api/report/${id}/station`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    alert('🎉 บันทึกข้อมูลคืบหน้าของอู่ซ่อมเสร็จสิ้น!');
                    closeModal();
                    fetchJobList(); 
                }
            } catch(e) { alert('❌ บันทึกความเห็นช่างล้มเหลว'); }
        }
    </script>
