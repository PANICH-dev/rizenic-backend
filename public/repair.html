<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZENIC ERP - Repair Stations Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 4px; border: 2px solid #1e293b; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-gray-100 min-h-screen">

    <div class="max-w-[1400px] mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-500/20 rounded-2xl flex items-center justify-center border border-amber-500/30 shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                    <i class="fa-solid fa-screwdriver-wrench text-2xl text-amber-400"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold text-white tracking-wide">สถานีซ่อมและงานช่าง</h1>
                    <p class="text-sm text-gray-400">RIZENIC ERP : Smart Repair Dashboard</p>
                </div>
            </div>
            <a href="index.html" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl font-semibold border border-slate-600 transition flex items-center gap-2 shadow-lg group">
                <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> กลับหน้าแรก
            </a>
        </div>

        <!-- Tabs -->
        <div class="flex gap-3 mb-6 overflow-x-auto pb-2 custom-scrollbar">
            <button onclick="switchRepairSubTab('menu-list')" id="btn-menu-list" class="px-6 py-3 bg-amber-500 text-slate-900 rounded-xl font-bold flex items-center gap-2 transition whitespace-nowrap shadow-[0_0_15px_rgba(245,158,11,0.3)]"><i class="fa-solid fa-rectangle-list"></i> 1. กระดานคิวรถซ่อม</button>
            <button onclick="switchRepairSubTab('menu-calendar')" id="btn-menu-calendar" class="px-6 py-3 bg-slate-800 text-gray-300 hover:text-white rounded-xl font-semibold flex items-center gap-2 transition whitespace-nowrap border border-slate-700"><i class="fa-solid fa-calendar-days"></i> 2. ปฏิทินกำหนดเสร็จ</button>
            <button onclick="switchRepairSubTab('menu-cake')" id="btn-menu-cake" class="px-6 py-3 bg-slate-800 text-gray-300 hover:text-white rounded-xl font-semibold flex items-center gap-2 transition whitespace-nowrap border border-slate-700"><i class="fa-solid fa-chart-pie"></i> 3. สรุปสถานี</button>
        </div>

        <!-- แท็บ 1: รายการรถ (ตารางซ่อมแซม Modern UI) -->
        <div id="menu-list" class="repair-sub-tab block">
            <div class="glass-panel rounded-2xl overflow-hidden shadow-2xl h-[75vh] flex flex-col">
                <div class="overflow-auto custom-scrollbar flex-1 relative">
                    <table class="w-full text-left border-collapse whitespace-nowrap min-w-[1000px]">
                        <thead class="sticky top-0 z-20">
                            <tr class="bg-slate-800/95 backdrop-blur-md shadow-md text-xs uppercase tracking-wider text-slate-300">
                                <th class="p-4 border-b border-slate-700">
                                    <div class="mb-2 text-white font-bold flex items-center gap-2"><i class="fa-solid fa-car text-blue-400"></i> ทะเบียน / รุ่นรถ</div>
                                    <input type="text" id="filter_plate" onkeyup="filterRepairTable()" placeholder="🔍 พิมพ์ทะเบียนรถ..." class="w-full bg-slate-900/50 border border-slate-600 rounded-lg px-3 py-2 text-xs text-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition-all placeholder-slate-500">
                                </th>
                                <th class="p-4 border-b border-slate-700 w-48">
                                    <div class="mb-2 text-white font-bold flex items-center gap-2"><i class="fa-solid fa-location-dot text-red-400"></i> สถานีล่าสุด</div>
                                    <select id="filter_station" onchange="filterRepairTable()" class="w-full bg-slate-900/50 border border-slate-600 rounded-lg px-2 py-2 text-xs text-amber-400 font-bold focus:border-amber-500 outline-none cursor-pointer">
                                        <option value="">-- ทุกสถานี --</option>
                                        <option value="13.รอส่งมอบ">13.รอส่งมอบ</option>
                                        <option value="12.พักซ่อม">12.พักซ่อม</option>
                                        <option value="11.ฟิล์ม">11.ฟิล์ม</option>
                                        <option value="10.กระจก">10.กระจก</option>
                                        <option value="09.ซ่อมแม็ก">09.ซ่อมแม็ก</option>
                                        <option value="08.เก็บงาน">08.เก็บงาน (QC)</option>
                                        <option value="06.ขัดสี">06.ขัดสี</option>
                                        <option value="05.ประกอบ">05.ประกอบ</option>
                                        <option value="04.พ่นสี">04.พ่นสี</option>
                                        <option value="03.เตรียมพื้น">03.เตรียมพื้น</option>
                                        <option value="02.โป๊ว">02.โป๊ว</option>
                                        <option value="01.เคาะ">01.เคาะ</option>
                                        <option value="ยังไม่ระบุสถานี">ยังไม่ระบุสถานี</option>
                                    </select>
                                </th>
                                <th class="p-4 border-b border-slate-700 w-48">
                                    <div class="mb-2 text-white font-bold flex items-center gap-2"><i class="fa-solid fa-tags text-green-400"></i> สเตตัส (ERP)</div>
                                    <select id="filter_status" onchange="filterRepairTable()" class="w-full bg-slate-900/50 border border-slate-600 rounded-lg px-2 py-2 text-xs text-slate-300 focus:border-amber-500 outline-none cursor-pointer">
                                        <option value="">-- ทุกสเตตัส --</option>
                                        <option value="09.จอดรอเข้าซ่อม">09.จอดรอเข้าซ่อม</option>
                                        <option value="10.กำลังซ่อม">10.กำลังซ่อม</option>
                                        <option value="11.รถซ่อมเสร็จรอส่งมอบ">11.รถซ่อมเสร็จรอส่งมอบ</option>
                                    </select>
                                </th>
                                <th class="p-4 border-b border-slate-700 text-center align-top w-32">
                                    <div class="mt-3 text-blue-400 font-bold">📅 ซ่อมเสร็จ (เป้า)</div>
                                </th>
                                <th class="p-4 border-b border-slate-700 text-center align-top w-32">
                                    <div class="mt-3 text-emerald-400 font-bold">✅ เสร็จจริง</div>

                    </table>

        <!-- แท็บ 2: ปฏิทิน -->
        <div id="menu-calendar" class="repair-sub-tab hidden">
            <div class="glass-panel p-6 rounded-2xl mb-6 flex justify-between items-center">
                <button onclick="changeMonth(-1)" class="px-4 py-2 bg-slate-800 border border-slate-600 rounded-xl hover:bg-slate-700 font-bold font-mono text-sm transition"><i class="fa-solid fa-chevron-left"></i> เดือนก่อนหน้า</button>

                <button onclick="changeMonth(1)" class="px-4 py-2 bg-slate-800 border border-slate-600 rounded-xl hover:bg-slate-700 font-bold font-mono text-sm transition">เดือนถัดไป <i class="fa-solid fa-chevron-right"></i></button>

            <div class="grid grid-cols-7 gap-2 text-center text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">

        <!-- แท็บ 3: กราฟ -->
        <div id="menu-cake" class="repair-sub-tab hidden">
            <div class="glass-panel p-8 rounded-2xl flex flex-col items-center justify-center max-w-xl mx-auto shadow-2xl">

    <!-- Pop-up รายการรถประจำวัน -->

        <div class="glass-panel rounded-2xl max-w-3xl w-full p-6 relative shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar border-amber-500/20">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl transition"><i class="fa-solid fa-xmark"></i></button>
            
            <div class="flex items-center gap-3 mb-6 border-b border-slate-700 pb-4">
                <div class="w-10 h-10 bg-amber-500/20 rounded-xl flex items-center justify-center border border-amber-500/30">
                    <i class="fa-solid fa-clipboard-check text-amber-400 text-lg"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-white tracking-wide">รายงานผลการปฏิบัติงานช่าง</h2>
                    <p class="text-xs text-slate-400 mt-1">ทะเบียน: <span id="m_plate" class="text-amber-400 font-mono font-bold bg-slate-900 px-1.5 py-0.5 rounded border border-slate-700"></span> | รุ่นรถ: <span id="m_car" class="text-white"></span></p>
                </div>
            </div>
            
            <input type="hidden" id="m_job_id">
            
            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3"><i class="fa-solid fa-location-crosshairs text-amber-500"></i> 1. เลือกสถานีที่ผ่านกระบวนการแล้ว</label>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6 bg-slate-900/50 p-4 rounded-xl border border-slate-700 shadow-inner">
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_kho" class="w-4 h-4 accent-amber-500"> 01. เคาะ</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_pou" class="w-4 h-4 accent-amber-500"> 02. โป๊ว</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_puan" class="w-4 h-4 accent-amber-500"> 03. เตรียมพื้น</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_pon" class="w-4 h-4 accent-amber-500"> 04. พ่นสี</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_prak" class="w-4 h-4 accent-amber-500"> 05. ประกอบ</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_kat" class="w-4 h-4 accent-amber-500"> 06. ขัดสี</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_qc" class="w-4 h-4 accent-amber-500"> 07. เก็บงาน/QC</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_mag" class="w-4 h-4 accent-amber-500"> 08. ซ่อมแม็ก</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_kraj" class="w-4 h-4 accent-amber-500"> 09. กระจก</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_film" class="w-4 h-4 accent-amber-500"> 10. ฟิล์ม</label>
                <label class="flex items-center gap-2 text-sm cursor-pointer p-1.5 hover:bg-slate-800 rounded-lg transition"><input type="checkbox" id="chk_pak" class="w-4 h-4 accent-amber-500"> 11. พักซ่อม</label>

            </div>

            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3"><i class="fa-solid fa-sliders text-amber-500"></i> 2. อัปเดตข้อมูลระบบ (ERP)</label>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-xs text-slate-400 font-bold mb-1">📅 วันที่ช่างซ่อมเสร็จจริง</label>
                    <input type="date" id="m_repair_date" class="w-full p-2.5 bg-slate-900 border border-slate-600 rounded-xl text-white outline-none focus:border-amber-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 font-bold mb-1">⚙️ สเตตัสหลัก</label>
                    <select id="m_job_status" class="w-full p-2.5 bg-slate-900 border border-slate-600 rounded-xl text-white outline-none focus:border-amber-500 text-sm">
                        <option value="09.จอดรอเข้าซ่อม">09.จอดรอเข้าซ่อม</option>
                        <option value="10.กำลังซ่อม">10.กำลังซ่อม</option>
                        <option value="11.รถซ่อมเสร็จรอส่งมอบ">11.รถซ่อมเสร็จรอส่งมอบ</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-blue-400">🔀 ส่งต่อแผนก (Routing)</label>
                    <select id="m_dept_routing" class="w-full p-2.5 bg-blue-900/20 border border-blue-500/50 rounded-xl text-blue-300 font-bold outline-none focus:border-blue-400 text-sm">
                        <option value="ซ่อม">ช่างซ่อมต่อ (Repair)</option>
                        <option value="อะไหล่">เบิกของแผนกอะไหล่ (Parts)</option>

            <div class="mb-8">
                <label class="block text-xs text-slate-400 font-bold mb-1"><i class="fa-solid fa-comment-dots text-amber-500"></i> 3. หมายเหตุถึงแผนกอื่น (ปัญหา/ขอเบิกอะไหล่)</label>
                <textarea id="m_repair_notes" rows="3" class="w-full p-3 bg-slate-900 border border-slate-600 rounded-xl text-white outline-none focus:border-amber-500 text-sm resize-none" placeholder="พิมพ์รายละเอียดที่นี่..."></textarea>
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 pt-5 border-t border-slate-700">
                <button onclick="editFullJobFromModal()" class="w-full sm:w-auto px-5 py-2.5 bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white border border-blue-500/50 font-bold rounded-xl text-sm transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-pen-to-square"></i> เปิดหน้าแก้ไขบิลเต็ม
                </button>
                <div class="flex gap-3 w-full sm:w-auto">
                    <button onclick="closeModal()" class="flex-1 sm:flex-none px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl border border-slate-600 text-sm transition">ยกเลิก</button>
                    <button onclick="submitRepairStation()" class="flex-1 sm:flex-none px-8 py-2.5 bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-white font-bold rounded-xl text-sm transition shadow-[0_0_15px_rgba(245,158,11,0.4)] flex items-center justify-center gap-2">

                    </button>
                </div>

        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        let originalRepairJobs = []; 
        let currentYear = 2026;
        let currentMonth = 6; 
        let chartInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
            if(sessionStorage.getItem('isLoggedIn') !== 'true') {
                alert('🚨 กรุณาเข้าสู่ระบบก่อนครับนาย!');
                window.location.href = 'index.html';
                return;
            }
            fetchJobList();
        });

        function switchRepairSubTab(tabId) {
            document.querySelectorAll('.repair-sub-tab').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            ['btn-menu-list', 'btn-menu-calendar', 'btn-menu-cake'].forEach(id => {
                document.getElementById(id).className = "px-6 py-3 bg-slate-800 text-gray-300 hover:text-white rounded-xl font-semibold flex items-center gap-2 transition whitespace-nowrap border border-slate-700";
            });
            document.getElementById('btn-' + tabId).className = "px-6 py-3 bg-amber-500 text-slate-900 rounded-xl font-bold flex items-center gap-2 transition whitespace-nowrap shadow-[0_0_15px_rgba(245,158,11,0.3)]";
            if(tabId === 'menu-cake') renderPieChart();
        }

        async function fetchJobList() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/reports`);
                const data = await res.json();
                
                originalRepairJobs = data.filter(j => 
                    j.department_routing === 'ซ่อม' || 
                    j.job_status === '09.จอดรอเข้าซ่อม' || 
                    j.job_status === '10.กำลังซ่อม' || 
                    j.job_status === '11.รถซ่อมเสร็จรอส่งมอบ'
                );

                renderCalendar();
                renderRepairListTable(originalRepairJobs);
            } catch (err) { console.error("โหลดข้อมูลพัง:", err); }
        }

        function computeHighestStationIFS(j) {
            if(j.station_ready) return "13.รอส่งมอบ";
            if(j.station_pak) return "12.พักซ่อม";
            if(j.station_film) return "11.ฟิล์ม";
            if(j.station_kraj) return "10.กระจก";
            if(j.station_mag) return "09.ซ่อมแม็ก";
            if(j.station_qc) return "08.เก็บงาน";
            if(j.station_kat) return "06.ขัดสี";
            if(j.station_prak) return "05.ประกอบ";
            if(j.station_pon) return "04.พ่นสี";
            if(j.station_puan) return "03.เตรียมพื้น";
            if(j.station_pou) return "02.โป๊ว";
            if(j.station_kho) return "01.เคาะ";
            return "ยังไม่ระบุสถานี";
        }

        // 🌟 ตารางดีไซน์ใหม่หมดจด + ปุ่ม Action แบบ Glassmorphism
        function renderRepairListTable(data) {
            const tbody = document.getElementById('repair_list_body');
            if(!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-12 text-center text-slate-500 font-bold bg-slate-800/30">📭 ไม่พบรถในกระบวนการซ่อมแซม</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(j => {
                const calculatedStation = computeHighestStationIFS(j);
                const targetDateStr = j.target_finish_date ? new Date(j.target_finish_date).toLocaleDateString('th-TH') : '-';
                const finishDateStr = j.repair_finish_date ? new Date(j.repair_finish_date).toLocaleDateString('th-TH') : '-';
                
                return `
                    <tr class="hover:bg-slate-800/80 transition-colors group">
                        <td class="p-4 border-b border-slate-800 text-white"><span class="bg-slate-900 border border-slate-700 px-2.5 py-1 rounded-md text-amber-400 mr-3 font-mono text-sm shadow-inner">${j.car_plate || 'ไม่มีป้าย'}</span> <span class="font-semibold tracking-wide">${j.car_brand} ${j.car_model || ''}</span></td>
                        <td class="p-4 border-b border-slate-800"><span class="px-3 py-1 bg-amber-500/10 border border-amber-500/30 rounded-lg text-amber-400 text-xs font-bold inline-flex items-center gap-1"><i class="fa-solid fa-wrench"></i> ${calculatedStation}</span></td>
                        <td class="p-4 border-b border-slate-800 text-xs font-semibold text-slate-300 inline-flex items-center gap-1 mt-3"><i class="fa-solid fa-tag text-slate-500"></i> ${j.job_status}</td>
                        <td class="p-4 border-b border-slate-800 text-center font-mono text-xs text-blue-400">${targetDateStr}</td>
                        <td class="p-4 border-b border-slate-800 text-center font-mono text-xs text-emerald-400">${finishDateStr}</td>
                        <td class="p-4 border-b border-slate-800 text-slate-400 italic text-xs max-w-[200px] truncate" title="${j.repair_notes || ''}">${j.repair_notes || '-'}</td>
                        <td class="p-4 border-b border-slate-800 text-center">
                            <div class="flex items-center justify-center gap-1.5 opacity-80 group-hover:opacity-100 transition-opacity">
                                <button onclick="openModal('${j.id}')" class="w-8 h-8 flex items-center justify-center bg-amber-500/10 text-amber-500 hover:bg-amber-500 hover:text-white border border-amber-500/30 rounded-lg transition" title="อัปเดตงานช่าง"><i class="fa-solid fa-sliders"></i></button>
                                <button onclick="editFullJob('${j.id}')" class="w-8 h-8 flex items-center justify-center bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white border border-blue-500/30 rounded-lg transition" title="แก้ไขบิลเต็ม"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="deleteJob('${j.id}')" class="w-8 h-8 flex items-center justify-center bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white border border-red-500/30 rounded-lg transition" title="ลบใบงานนี้"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 🔍 ระบบกรองข้อมูลตาราง
        function filterRepairTable() {
            const fPlate = document.getElementById('filter_plate').value.toLowerCase();
            const fStation = document.getElementById('filter_station').value;
            const fStatus = document.getElementById('filter_status').value;

            const filteredData = originalRepairJobs.filter(j => {
                const matchPlate = (j.car_plate || '').toLowerCase().includes(fPlate) || (j.car_brand || '').toLowerCase().includes(fPlate) || (j.car_model || '').toLowerCase().includes(fPlate);
                const calcStation = computeHighestStationIFS(j);
                const matchStation = fStation === "" || calcStation.includes(fStation);
                const matchStatus = fStatus === "" || (j.job_status || '').includes(fStatus);
                return matchPlate && matchStation && matchStatus;
            });
            renderRepairListTable(filteredData);
        }

        // 🗑️ ฟังก์ชันลบใบงาน (มี Alert ยืนยัน)
        async function deleteJob(jobId) {
            if(!confirm('🚨 คำเตือนขั้นเด็ดขาด!\n\nคุณแน่ใจหรือไม่ที่จะ "ลบใบงานนี้" ?\nข้อมูลทั้งหมดที่เกี่ยวกับรถคันนี้จะหายไปจากระบบอย่างถาวร!')) return;
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/report/${jobId}`, { method: 'DELETE' });
                if(res.ok) {
                    alert('🗑️ ลบใบงานออกจากระบบเรียบร้อยแล้ว');
                    fetchJobList(); // รีเฟรชตาราง
                } else {
                    const err = await res.json();
                    alert('❌ เกิดข้อผิดพลาดในการลบ: ' + err.error);
                }
            } catch (e) {
                alert('❌ ติดต่อเซิร์ฟเวอร์ไม่ได้ครับนาย');
            }
        }

        function editFullJob(jobId) {
            sessionStorage.setItem('edit_job_id', jobId);
            window.location.href = 'index.html';
        }
        
        function editFullJobFromModal() {
            const id = document.getElementById('m_job_id').value;
            if(id) editFullJob(id);
        }

        async function openModal(jobId) {
            try {
                const job = originalRepairJobs.find(j => String(j.id) === String(jobId));
                if (!job) return alert('❌ ไม่พบข้อมูลรถคันนี้ในระบบ');

                document.getElementById('m_job_id').value = job.id;
                document.getElementById('m_plate').innerText = job.car_plate || 'ไม่มีป้าย';
                document.getElementById('m_car').innerText = `${job.car_brand} ${job.car_model || ''}`;
                
                document.getElementById('chk_kho').checked = job.station_kho;
                document.getElementById('chk_pou').checked = job.station_pou;
                document.getElementById('chk_puan').checked = job.station_puan;
                document.getElementById('chk_pon').checked = job.station_pon;
                document.getElementById('chk_prak').checked = job.station_prak;
                document.getElementById('chk_kat').checked = job.station_kat;
                document.getElementById('chk_qc').checked = job.station_qc;
                document.getElementById('chk_mag').checked = job.station_mag;
                document.getElementById('chk_kraj').checked = job.station_kraj;
                document.getElementById('chk_film').checked = job.station_film;
                document.getElementById('chk_pak').checked = job.station_pak;
                document.getElementById('chk_ready').checked = job.station_ready;

                document.getElementById('m_repair_notes').value = job.repair_notes || '';
                document.getElementById('m_job_status').value = job.job_status || '10.กำลังซ่อม';
                document.getElementById('m_dept_routing').value = job.department_routing || 'ซ่อม';

                if(job.repair_finish_date) document.getElementById('m_repair_date').value = job.repair_finish_date.split('T')[0];
                else document.getElementById('m_repair_date').value = '';

                closeDayListModal();
                document.getElementById('stationModal').classList.remove('hidden');
            } catch(e) { alert('❌ เปิดหน้าต่างไม่สำเร็จ'); }
        }

        function closeModal() { document.getElementById('stationModal').classList.add('hidden'); }

        async function submitRepairStation() {
            const id = document.getElementById('m_job_id').value;
            const payload = {
                station_kho: document.getElementById('chk_kho').checked,
                station_pou: document.getElementById('chk_pou').checked,
                station_puan: document.getElementById('chk_puan').checked,
                station_pon: document.getElementById('chk_pon').checked,
                station_prak: document.getElementById('chk_prak').checked,
                station_kat: document.getElementById('chk_kat').checked,
                station_qc: document.getElementById('chk_qc').checked,
                station_mag: document.getElementById('chk_mag').checked,
                station_kraj: document.getElementById('chk_kraj').checked,
                station_film: document.getElementById('chk_film').checked,
                station_pak: document.getElementById('chk_pak').checked,
                station_ready: document.getElementById('chk_ready').checked,
                repair_notes: document.getElementById('m_repair_notes').value,
                repair_finish_date: document.getElementById('m_repair_date').value || null,
                job_status: document.getElementById('m_job_status').value,
                department_routing: document.getElementById('m_dept_routing').value 
            };

            try {
                const res = await fetch(`${API_BASE_URL}/api/report/${id}/station`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    alert('🎉 อัปเดตงานช่างเรียบร้อยแล้ว!');
                    closeModal();
                    fetchJobList(); 
                }
            } catch(e) { alert('❌ บันทึกข้อมูลล้มเหลว'); }
        }

        // ====== ฟังก์ชันปฏิทินและกราฟ (คงเดิม) ======
        function renderCalendar() {
            const grid = document.getElementById('calendar_grid'); grid.innerHTML = '';
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('calendar_month_title').innerText = `${monthNames[currentMonth]} ${currentYear}`;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

            for(let i = 0; i < firstDay; i++) { grid.innerHTML += `<div class="bg-slate-900/20 p-2 rounded-xl border border-transparent"></div>`; }

            for(let day = 1; day <= totalDays; day++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const targetQty = originalRepairJobs.filter(j => j.target_finish_date && j.target_finish_date.split('T')[0] === dateStr).length;
                const actualQty = originalRepairJobs.filter(j => j.actual_finish_date && j.actual_finish_date.split('T')[0] === dateStr).length;

                let badgeBlock = '';
                if(targetQty > 0) badgeBlock += `<div class="text-[10px] bg-blue-900/50 text-blue-300 font-bold border border-blue-800 rounded px-1 mt-1 flex justify-between"><span>📋 ซ่อมเสร็จ:</span><span>${targetQty}</span></div>`;
                if(actualQty > 0) badgeBlock += `<div class="text-[10px] bg-emerald-900/50 text-emerald-300 font-bold border border-emerald-800 rounded px-1 mt-1 flex justify-between"><span>✅ เสร็จจริง:</span><span>${actualQty}</span></div>`;

                grid.innerHTML += `
                    <div onclick="clickCalendarDate('${dateStr}')" class="glass-panel p-2 rounded-xl hover:border-amber-500 cursor-pointer transition flex flex-col justify-between min-h-[85px]">
                        <span class="text-xs font-black text-slate-400 font-mono">${day}</span>
                        <div class="flex-1 flex flex-col justify-end">${badgeBlock}</div>
                    </div>
                `;
            }
        }

        function changeMonth(direction) {
            currentMonth += direction;
            if(currentMonth > 11) { currentMonth = 0; currentYear++; }
            if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function clickCalendarDate(dateString) {
            const dayJobs = originalRepairJobs.filter(j => 
                (j.target_finish_date && j.target_finish_date.split('T')[0] === dateString) ||
                (j.actual_finish_date && j.actual_finish_date.split('T')[0] === dateString) ||
                (j.delivery_date && j.delivery_date.split('T')[0] === dateString)
            );

            if(dayJobs.length === 0) return alert(`🔍 วันที่ ${new Date(dateString).toLocaleDateString('th-TH')} ไม่มีคิวนัดหมายใดๆ ครับ`);
            document.getElementById('dayListDateTitle').innerText = new Date(dateString).toLocaleDateString('th-TH');
            
            const listContent = document.getElementById('dayListContent');
            listContent.innerHTML = dayJobs.map(j => {
                const station = computeHighestStationIFS(j);
                return `
                    <div class="bg-slate-800/80 border border-slate-600 rounded-xl p-4 hover:border-amber-500 transition flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                        <div>
                            <div class="font-bold text-white mb-1">
                                <span class="text-amber-400 bg-slate-900 border border-slate-700 px-2 py-0.5 rounded font-mono mr-2">${j.car_plate || '-'}</span> 
                                ${j.car_brand} ${j.car_model || ''}
                            </div>
                            <div class="text-xs text-slate-400">สถานะหลัก: ${j.job_status} | <span class="text-amber-300">สถานีล่าสุด: ${station}</span></div>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="openModal('${j.id}')" class="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold rounded-lg transition"><i class="fa-solid fa-sliders"></i> อัปเดตช่าง</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('dayListModal').classList.remove('hidden');
        }

        function closeDayListModal() { document.getElementById('dayListModal').classList.add('hidden'); }

        function renderPieChart() {
            const counters = { "เคาะ":0, "โป๊ว":0, "เตรียมพื้น":0, "พ่นสี":0, "ประกอบ":0, "ขัดสี":0, "เก็บงาน":0, "ซ่อมแม็ก":0, "กระจก":0, "ฟิล์ม":0, "พักซ่อม":0, "รอส่งมอบ":0, "ยังไม่ระบุ":0 };
            
            originalRepairJobs.forEach(j => {
                const station = computeHighestStationIFS(j);
                if(station.includes("เคาะ")) counters["เคาะ"]++;
                else if(station.includes("โป๊ว")) counters["โป๊ว"]++;
                else if(station.includes("เตรียมพื้น")) counters["เตรียมพื้น"]++;
                else if(station.includes("พ่นสี")) counters["พ่นสี"]++;
                else if(station.includes("ประกอบ")) counters["ประกอบ"]++;
                else if(station.includes("ขัดสี")) counters["ขัดสี"]++;
                else if(station.includes("เก็บงาน")) counters["เก็บงาน"]++;
                else if(station.includes("ซ่อมแม็ก")) counters["ซ่อมแม็ก"]++;
                else if(station.includes("กระจก")) counters["กระจก"]++;
                else if(station.includes("ฟิล์ม")) counters["ฟิล์ม"]++;
                else if(station.includes("พักซ่อม")) counters["พักซ่อม"]++;
                else if(station.includes("รอส่งมอบ")) counters["รอส่งมอบ"]++;
                else counters["ยังไม่ระบุ"]++;
            });

            if(chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('stationPieChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(counters),
                    datasets: [{ data: Object.values(counters), backgroundColor: ['#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#22c55e', '#10b981', '#06b6d4', '#3b82f6', '#6366f1', '#a855f7', '#ec4899', '#6b7280'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#e2e8f0', font: { family: 'Noto Sans Thai' } } } } }
            });
        }
    </script>
</body>
</html>
