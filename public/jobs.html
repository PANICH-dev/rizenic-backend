<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZENIC ERP - Job Tracking Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Noto Sans Thai', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 border-b border-gray-700 pb-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-table-list text-3xl text-green-500"></i>
                <div>
                    <h1 class="text-3xl font-bold tracking-wider text-white">ระบบติดตามสถานะงานซ่อม</h1>
                    <p class="text-xs text-gray-400 mt-1">สิทธิ์เข้าถึง: <span id="user_role_display" class="text-amber-400 font-bold">-</span> | พนักงาน: <span id="user_name_display" class="text-cyan-400">-</span></p>
                </div>
            </div>
            <a href="index.html" class="px-5 py-2.5 bg-gray-800 hover:bg-gray-700 rounded-xl font-semibold border border-gray-700 transition flex items-center gap-2">
                <i class="fa-solid fa-file-invoice"></i> กลับหน้าเปิดบิล
            </a>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 mb-8 grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="text-xs text-gray-400 block mb-1">ค้นหาด่วน (ชื่อลูกค้า/รุ่นรถ/VIN)</label>
                <input type="text" id="search_input" oninput="filterJobs()" class="w-full p-2.5 bg-gray-900 border border-gray-600 rounded-xl text-white text-sm outline-none focus:border-green-500" placeholder="พิมพ์เพื่อค้นหา...">
            </div>
            <div>
                <label class="text-xs text-gray-400 block mb-1">กรองตามสถานะงาน (12 สเตป)</label>
                <select id="status_filter" onchange="filterJobs()" class="w-full p-2.5 bg-gray-900 border border-gray-600 rounded-xl text-white text-sm outline-none focus:border-green-500">
                    <option value="">-- ทุกสถานะ --</option>
                </select>
            </div>
            <div>
                <label class="text-xs text-gray-400 block mb-1">กรองตามสาขา</label>
                <select id="branch_filter" onchange="filterJobs()" class="w-full p-2.5 bg-gray-900 border border-gray-600 rounded-xl text-white text-sm outline-none focus:border-green-500">
                    <option value="">-- ทุกสาขา --</option>
                </select>
            </div>
            <div>
                <button onclick="fetchJobList()" class="w-full py-2.5 bg-green-600 hover:bg-green-500 text-white font-bold rounded-xl shadow-lg transition duration-200 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-rotate"></i> รีเฟรชรายการ
                </button>
            </div>
        </div>

        <div class="bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead class="bg-black/40 text-gray-400 text-xs uppercase tracking-wider">
                        <tr class="border-b border-gray-700">
                            <th class="p-4">สาขา</th>
                            <th class="p-4">สถานะปัจจุบัน</th>
                            <th class="p-4">ข้อมูลตัวรถ / VIN</th>
                            <th class="p-4">ชื่อลูกค้า / เบอร์โทร</th>
                            <th class="p-4">ประกันภัย / ลูกค้า</th>
                            <th class="p-4">ความเสียหาย</th>
                            <th class="p-4">พนักงานรับรถ</th>
                            <th class="p-4 text-center">ปฏิบัติการ</th>
                        </tr>
                    </thead>
                    <tbody id="job_table_body" class="text-sm text-gray-300 divide-y divide-gray-800">
                        <tr>
                            <td colspan="8" class="p-8 text-center text-gray-500">กำลังประมวลผลสิทธิ์พนักงานและโหลดข้อมูล...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        let allJobsData = []; 

        // รายการสถานะซ่อมแซม 12 สเตปตามที่คุณ BA ลิสต์มาเป๊ะๆ
        const rizenicStatuses = [
            "01.ติดต่อสอบถาม", "02.รอเสนอประกัน", "03.รอประกันอนุมัติ", 
            "04.รอลูกค้าอนุมัติ (เงินสด)", "05.อนุมัติแล้ว", "06.สั่งอะไหล่", 
            "07.รอนัดหมายเข้าซ่อม", "08.นัดหมายแล้วรอเข้าซ่อม", "09.จอดรอเข้าซ่อม", 
            "10.กำลังซ่อม", "11.รถซ่อมเสร็จรอส่งมอบ", "12.ส่งมอบแล้ว"
        ];

        document.addEventListener('DOMContentLoaded', () => {
            // เช็กระบบล็อกอินความปลอดภัยหน้าบ้าน
            if(sessionStorage.getItem('isLoggedIn') !== 'true') {
                alert('🚨 กรุณาเข้าสู่ระบบก่อนครับ!');
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('user_role_display').innerText = sessionStorage.getItem('emp_role');
            document.getElementById('user_name_display').innerText = sessionStorage.getItem('emp_name');

            setupFilterDropdowns();
            fetchJobList();
        });

        // ยัดสเตปสถานะ 12 สเตปเข้าดร็อปดาวน์ตัวกรอง
        function setupFilterDropdowns() {
            const statusSelect = document.getElementById('status_filter');
            rizenicStatuses.forEach(s => statusSelect.innerHTML += `<option value="${s}">${s}</option>`);
        }

        async function fetchJobList() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/reports`);
                const data = await res.json();
                
                const role = sessionStorage.getItem('emp_role');
                const empName = sessionStorage.getItem('emp_name');
                const empBranch = sessionStorage.getItem('emp_branch');

                // 🔐 ระบบคัดกรองจัดสรรข้อมูลตามสิทธิ์พนักงาน (Data Isolation)
                if (role === 'BA' || role === 'Manager' || role === 'Admin' || role === 'แอดมิน') {
                    // สิทธิ์ผู้บริหารระดับสูง: โหลดขึ้นทั้งหมด ไม่มีค่าฟิลเตอร์เริ่มต้น
                    allJobsData = data;
                    buildBranchFilter(data, false);
                } else {
                    // สิทธิ์พนักงาน SA: ดึงเฉพาะข้อมูลสาขาตัวเอง และล็อกกรองเฉพาะชื่อตัวเองตั้งแต่เริ่มรันหน้าจอ!
                    allJobsData = data.filter(job => job.branch_name === empBranch && job.sa_owner === empName);
                    buildBranchFilter(allJobsData, true);
                }

                renderTable(allJobsData);
            } catch (err) {
                document.getElementById('job_table_body').innerHTML = `<tr><td colspan="8" class="p-8 text-center text-red-400">❌ ไม่สามารถดึงข้อมูลรายการได้</td></tr>`;
            }
        }

        function buildBranchFilter(data, isLocked) {
            const branchSelect = document.getElementById('branch_filter');
            const uniqueBranches = [...new Set(data.map(j => j.branch_name).filter(Boolean))];
            
            if(isLocked) {
                branchSelect.innerHTML = `<option value="${sessionStorage.getItem('emp_branch')}">${sessionStorage.getItem('emp_branch')}</option>`;
                branchSelect.disabled = true;
            } else {
                branchSelect.innerHTML = '<option value="">-- ทุกสาขา --</option>';
                uniqueBranches.forEach(b => branchSelect.innerHTML += `<option value="${b}">${b}</option>`);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('job_table_body');
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-8 text-center text-gray-500">📭 ไม่พบรายการใบงานซ่อมตามสิทธิ์หรือตัวกรองที่เลือก</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(job => {
                // สีสัญญาณไฟจราจรระดับความเสียหาย 🟢🟡🔴 ตามสั่ง
                let damageBadge = '';
                if(job.damage_level === 'เบา') damageBadge = '<span class="px-2.5 py-1 bg-green-900/40 text-green-400 border border-green-800 rounded-lg font-bold text-xs">🟢 เบา</span>';
                else if(job.damage_level === 'กลาง') damageBadge = '<span class="px-2.5 py-1 bg-yellow-900/40 text-yellow-400 border border-yellow-800 rounded-lg font-bold text-xs">🟡 กลาง</span>';
                else damageBadge = '<span class="px-2.5 py-1 bg-red-900/40 text-red-400 border border-red-800 rounded-lg font-bold text-xs">🔴 หนัก</span>';

                return `
                    <tr class="hover:bg-gray-800/40 transition">
                        <td class="p-4 font-bold text-amber-500">${job.branch_name}</td>
                        <td class="p-4"><span class="px-2.5 py-1 bg-gray-900 border border-gray-700 rounded text-cyan-400 font-mono text-xs font-bold">${job.job_status || '-'}</span></td>
                        <td class="p-4 font-semibold text-white">${job.car_brand || 'Tesla'} - <span class="text-gray-400 font-normal">${job.car_model || ''}</span><br><span class="text-xs font-mono text-gray-500">${job.vin_no || '-'}</span></td>
                        <td class="p-4">${job.customer_name}<br><span class="text-xs text-gray-400 font-mono">${job.phone_number || '-'}</span></td>
                        <td class="p-4 text-xs">${job.payment_type || '-'}<br><span class="text-gray-400">ประเภท: ${job.customer_type || '-'}</span></td>
                        <td class="p-4">${damageBadge}</td>
                        <td class="p-4 text-gray-400 font-medium">${job.sa_owner}</td>
                        <td class="p-4 text-center">
                            <button onclick="goToEditJob('${job.id}')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded-xl transition shadow-md flex items-center gap-1 mx-auto">
                                <i class="fa-solid fa-folder-open"></i> แก้ไขใบงาน
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterJobs() {
            const search = document.getElementById('search_input').value.toLowerCase();
            const status = document.getElementById('status_filter').value;
            const branch = document.getElementById('branch_filter').value;

            const filtered = allJobsData.filter(job => {
                const matchesSearch = !search || 
                    (job.customer_name && job.customer_name.toLowerCase().includes(search)) ||
                    (job.car_model && job.car_model.toLowerCase().includes(search)) ||
                    (job.vin_no && job.vin_no.toLowerCase().includes(search));
                
                const matchesStatus = !status || job.job_status === status;
                const matchesBranch = !branch || job.branch_name === branch;

                return matchesSearch && matchesStatus && matchesBranch;
            });

            renderTable(filtered);
        }

        // 🎯 ฟังก์ชันเด็ดสลับหน้าจอข้ามไปหน้าบิล: บันทึก ID ลง Session แล้วย้ายหน้าจอ
        function goToEditJob(jobId) {
            sessionStorage.setItem('edit_job_id', jobId);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
